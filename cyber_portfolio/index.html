<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cyber Portfolio</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at bottom, #0a0f1f, #000);
  color: white;
  font-family: 'Courier New', monospace;
  overflow-x: hidden;
}

/* canvas particles */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  z-index: 2;
}

h1 {
  font-size: 3rem;
}

h1 span {
  color: #00ffe1;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  z-index: 1;
}

/* typing */
.typing {
  font-size: 1.5rem;
  color: #00ffe1;
  border-right: 2px solid #00ffe1;
  padding-right: 5px;
  animation: blink 0.7s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* SECTION */
.section {
  padding: 100px 20px;
  text-align: center;
  opacity: 0;
  transform: translateY(50px);
  transition: 1s;
  position: relative;
  z-index: 1;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

/* cards */
.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid #00ffe1;
  padding: 20px;
  width: 250px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00ffe1;
}

/* code box */
.code-box {
  background: #0d1117;
  padding: 20px;
  border-radius: 10px;
  text-align: left;
  color: #00ff88;
  max-width: 500px;
  margin: auto;
  font-size: 0.9rem;
}
</style>
</head>

<body>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<header>
  <h1>Cyber <span>Portfolio</span></h1>
</header>

<div class="hero">
  <div class="typing" id="typing"></div>
</div>

<div class="section">
  <h2>About</h2>
  <p>Just code for fun ⚡</p>
</div>

<div class="section">
  <h2>Projects</h2>
  <div class="cards">
    <div class="card">SaaS Platform</div>
    <div class="card">Inventory System</div>
    <div class="card">3D Printing</div>
  </div>
</div>

<div class="section">
  <h2>Code</h2>
  <div class="code-box">
    header {<br>
    &nbsp;&nbsp;position: fixed;<br>
    &nbsp;&nbsp;top: 0;<br>
    &nbsp;&nbsp;left: 0;<br>
    &nbsp;&nbsp;z-index: 50;<br>
    }
  </div>
</div>

<script>
// =========================
// TYPING EFFECT
// =========================
const text = ["JUST CODE FOR FUN 💻", "BUILDING COOL STUFF 🚀"];
let i = 0;
let j = 0;
let current = "";
let isDeleting = false;

function type() {
  current = text[i];

  if (!isDeleting) {
    document.getElementById("typing").innerHTML = current.substring(0, j++);
    if (j > current.length) {
      isDeleting = true;
      setTimeout(type, 1000);
      return;
    }
  } else {
    document.getElementById("typing").innerHTML = current.substring(0, j--);
    if (j == 0) {
      isDeleting = false;
      i = (i + 1) % text.length;
    }
  }
  setTimeout(type, isDeleting ? 50 : 100);
}

type();

// =========================
// SCROLL ANIMATION
// =========================
const sections = document.querySelectorAll(".section");

window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});

// =========================
// PARTICLES FOLLOW MOUSE
// =========================
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

window.addEventListener("mousemove", (e) => {
  mouse.x = e.x;
  mouse.y = e.y;

  for (let i = 0; i < 5; i++) {
    particles.push(new Particle());
  }
});

class Particle {
  constructor() {
    this.x = mouse.x;
    this.y = mouse.y;
    this.size = Math.random() * 3 + 1;
    this.speedX = (Math.random() - 0.5) * 2;
    this.speedY = (Math.random() - 0.5) * 2;
    this.life = 100;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.life--;
  }

  draw() {
    ctx.fillStyle = "rgba(0,255,225,0.8)";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, index) => {
    p.update();
    p.draw();

    if (p.life <= 0) {
      particles.splice(index, 1);
    }
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
